<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>AI Assistant</h2>
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">Online</span>
            </div>
        </div>
        <div class="chat-box" id="chat-box">
            <!-- Chat messages will be dynamically added here -->
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
    <div style="position: fixed; left: 0; right: 0; bottom: 12px; display: flex; justify-content: center; padding: 0 12px;">
        <div style="max-width: 520px; width: 100%; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <a href="./support.html" style="color:#fff; font-weight:600; font-size:12px; text-decoration:none; padding:8px 10px; border-radius:999px; background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.18);">Support</a>
            <a href="./delete_data.html" style="color:#fff; font-weight:600; font-size:12px; text-decoration:none; padding:8px 10px; border-radius:999px; background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.18);">Delete Data</a>
            <a href="./privacy.html" style="color:#fff; font-weight:600; font-size:12px; text-decoration:none; padding:8px 10px; border-radius:999px; background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.18);">Privacy</a>
            <a href="./terms.html" style="color:#fff; font-weight:600; font-size:12px; text-decoration:none; padding:8px 10px; border-radius:999px; background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.18);">Terms</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
